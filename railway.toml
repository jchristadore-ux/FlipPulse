# Railway deploy config — single-customer FlipPulse bot.
#
# One bot per Railway project. The service runs `python bot.py`, which reads
# all per-customer configuration from environment variables (see .env.example)
# and persists state to the attached volume mounted at /data.
#
# The volume itself is attached in the Railway dashboard (Project → service →
# Volumes → mount at /data). See CUSTOMER_ONBOARDING.md.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python bot.py"
# Restart the worker if it crashes; a trading bot should not stay down silently.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
